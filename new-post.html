    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initNewPostPage();
        });

        function updateTopNavLoginStatus(isLoggedIn) {
            const userLinksContainer = document.getElementById('user-links-container');
            const loggedInUser = document.getElementById('logged-in-user');
            const currentUsername = document.getElementById('current-username');
            const logoutLink = document.getElementById('logout-link');

            if (isLoggedIn) {
                userLinksContainer.style.display = 'none';
                loggedInUser.style.display = 'flex';
                currentUsername.textContent = localStorage.getItem('flarumUsername') || '用户';
                
                logoutLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    clearFlarumToken();
                    window.location.href = 'index.html';
                });
            } else {
                userLinksContainer.style.display = 'block';
                loggedInUser.style.display = 'none';
            }
        }

        async function initNewPostPage() {
            const isLoggedIn = !!getFlarumToken();
            const editorContainer = document.getElementById('editor-container');
            
            updateTopNavLoginStatus(isLoggedIn);
            
            if (!isLoggedIn) {
                return;
            }

            editorContainer.innerHTML = `
                <div class="post-editor">
                    <div class="post-editor-header">
                        <h2>发表新帖�?/h2>
                        <span style="font-size: 12px; color: #999;">当前登录�?{localStorage.getItem('flarumUsername') || '用户'}</span>
                    </div>
                    <div class="post-editor-body">
                        <form id="new-post-form">
                            <div class="form-group">
                                <label for="post-title">帖子标题�?/label>
                                <input type="text" id="post-title" placeholder="请输入标题（最�?0个字符）" required maxlength="50">
                                <div id="title-char-count" class="char-count">0/50</div>
                            </div>

                            <div class="form-group">
                                <label>帖子内容�?/label>
                                <div class="toolbar">
                                    <button type="button" class="toolbar-btn" data-action="bold" title="粗体 (Ctrl+B)">
                                        <b>B</b>
                                    </button>
                                    <button type="button" class="toolbar-btn" data-action="italic" title="斜体 (Ctrl+I)">
                                        <i>I</i>
                                    </button>
                                    <button type="button" class="toolbar-btn" data-action="underline" title="下划�?(Ctrl+U)">
                                        <u>U</u>
                                    </button>
                                    <button type="button" class="toolbar-btn" data-action="strike" title="删除�?>
                                        <s>S</s>
                                    </button>
                                    <span class="toolbar-divider"></span>
                                    <button type="button" class="toolbar-btn" data-action="quote" title="引用">
                                        "
                                    </button>
                                    <button type="button" class="toolbar-btn" data-action="code" title="代码">
                                        &lt;/&gt;
                                    </button>
                                    <span class="toolbar-divider"></span>
                                    <button type="button" class="toolbar-btn emoji-btn" data-action="emoji" title="表情">
                                        😊
                                    </button>
                                    <button type="button" class="toolbar-btn image-btn" data-action="image" title="插入图片" id="insert-image-btn" style="display: none;">
                                        🖼�?
                                    </button>
                                </div>
                                <div class="emoji-picker" id="emoji-picker" style="position: relative;">
                                    <div class="emoji-grid">
                                        ${['😀','😃','😄','😁','😆','😅','🤣','😂','🙂','😊','😇','🥰','😍','🤩','😘','😗','😚','😙','🥲','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🤫','🤔','🤐','🤨','😐','😑','😶','😏','😒','🙄','😬','🤥','😌','😔','😪','🤤','😴','😷','🤒','🤕','🤢','🤮','🥵','🥶','🥴','😵','🤯','🤠','🥳','🥸','😎','🤓','🧐','😕','😟','🙁','☹️','😮‍�?,'😥','😢','😭','😱','😨','😰','😥','🤯','😲','😳','🥵','🤤','🥴','😵','💫','🤢','🤮','🤒','🤕','😷','🤧','🥶','🥵','😴','😪','🤫','🤭','🤗','🤑','🤤','😋','😛','😜','🤪','😝','🤐','🤔','🤨','😐','😑','😶','😏','😒','🙄','😬','🤥','😌','😔','🧐','🤓','😎','🥸','🥳','🤠','🥰','😍','🤩','😘','😗','😚','😙','🙂','😊','😇','🤣','😂','😅','😆','😁','😄','😃','😀'].map(e => `<span class="emoji-item" data-emoji="${e}">${e}</span>`).join('')}
                                    </div>

                                <input type="file" id="image-upload" accept="image/*">
                                <textarea id="post-content" class="post-content-area" placeholder="分享你的故事..." required></textarea>
                            </div>

                            <div class="submit-area">

            setupNewPostForm();

        function setupNewPostForm() {
            const form = document.getElementById('new-post-form');
            const titleInput = document.getElementById('post-title');
            const contentInput = document.getElementById('post-content');
            const charCount = document.getElementById('title-char-count');
            const submitBtn = document.getElementById('submit-btn');

            titleInput.addEventListener('input', function() {
                const count = this.value.length;
                charCount.textContent = `${count}/50`;
                charCount.className = 'char-count' + (count >= 45 ? ' warning' : '');
            });

            setupToolbar(contentInput);

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const title = titleInput.value.trim();
                const content = contentInput.value.trim();

                if (!title) {
                    alert('请输入标�?);
                    return;
                }
                
                if (!content) {
                    alert('请输入内�?);
                    return;
                }

                submitBtn.textContent = '发布�?..';
                submitBtn.disabled = true;

                try {
                    const response = await flarumRequest('/discussions', {
                        method: 'POST',
                        json: {
                            data: {
                                type: 'discussions',
                                attributes: {
                                    title: title,
                                    content: content
                                }
                            }
                        }
                    });

                    if (response && response.data?.id) {
                        alert('发帖成功�?);
                        window.location.href = `post.html?id=${response.data.id}`;
                    } else {
                        alert('发帖失败，请重试');
                    }
                } catch (error) {
                    console.error('发帖失败:', error);
                    alert('发帖失败�? + (error.message || '未知错误'));
                } finally {
                    submitBtn.textContent = '发表帖子';
                    submitBtn.disabled = false;
                }
            });
        }

        function setupToolbar(textarea) {
            const toolbar = document.querySelector('.toolbar');
            const emojiPicker = document.getElementById('emoji-picker');
            const imageUpload = document.getElementById('image-upload');

            toolbar.addEventListener('click', function(e) {
                const target = e.target.closest('.toolbar-btn');
                if (!target) return;
                
                const action = target.dataset.action;
                if (!action) return;

                switch (action) {
                    case 'bold':
                        wrapSelection(textarea, '**', '**');
                        break;
                    case 'italic':
                        wrapSelection(textarea, '*', '*');
                        break;
                    case 'underline':
                        wrapSelection(textarea, '__', '__');
                        break;
                    case 'strike':
                        wrapSelection(textarea, '~~', '~~');
                        break;
                    case 'quote':
                        wrapSelection(textarea, '> ', '', true);
                        break;
                    case 'code':
                        wrapSelection(textarea, '`', '`');
                        break;
                    case 'emoji':
                        emojiPicker.style.display = emojiPicker.style.display === 'block' ? 'none' : 'block';
                        break;
                    case 'image':
                        imageUpload.click();
                        break;
                }
            });

            emojiPicker.addEventListener('click', function(e) {
                const emojiItem = e.target.closest('.emoji-item');
                if (emojiItem) {
                    insertAtCursor(textarea, emojiItem.dataset.emoji);
                }
            });

            imageUpload.addEventListener('change', async function(e) {
                const file = e.target.files?.[0];
                if (!file) return;

                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件');
                    return;
                }
                
                if (file.size > 2 * 1024 * 1024) {
                    alert('图片大小不能超过2MB');
                    return;
                }

                try {
                    const formData = new FormData();
                    formData.append('file', file);

                    const response = await flarumRequest('/api/files', {
                        method: 'POST',
                        body: formData
                    });

                    if (response && response.data?.attributes?.url) {
                        insertAtCursor(textarea, `![${file.name}](${response.data.attributes.url})`);
                    }
                } catch (error) {
                    console.error('图片上传失败:', error);
                    alert('图片上传失败，请重试');
                }

                imageUpload.value = '';
            });

            textarea.addEventListener('keydown', function(e) {
                if (e.ctrlKey || e.metaKey) {
                    switch (e.key.toLowerCase()) {
                        case 'b':
                            e.preventDefault();
                            wrapSelection(textarea, '**', '**');
                            break;
                        case 'i':
                            e.preventDefault();
                            wrapSelection(textarea, '*', '*');
                            break;
                        case 'u':
                            e.preventDefault();
                            wrapSelection(textarea, '__', '__');
                            break;
                    }
                }
            });
        }

        function insertAtCursor(textarea, text) {
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const before = textarea.value.substring(0, start);
            const after = textarea.value.substring(end);
            textarea.value = before + text + after;
            textarea.selectionStart = textarea.selectionEnd = start + text.length;
            textarea.focus();
        }

        function wrapSelection(textarea, before, after, newLine = false) {
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const selectedText = textarea.value.substring(start, end);
            const beforeText = textarea.value.substring(0, start);
            const afterText = textarea.value.substring(end);
            
            let newText;
            if (newLine) {
                const lineStart = beforeText.lastIndexOf('\n') + 1;
                const lineBefore = beforeText.substring(0, lineStart);
                const lineAfter = beforeText.substring(lineStart);
                newText = lineBefore + before + lineAfter + selectedText + after + '\n' + afterText;
                textarea.value = newText;
                textarea.selectionStart = lineStart + before.length + lineAfter.length;
                textarea.selectionEnd = textarea.selectionStart + selectedText.length;
            } else {
                newText = beforeText + before + selectedText + after + afterText;
                textarea.value = newText;
                textarea.selectionStart = start + before.length;
                textarea.selectionEnd = end + before.length;
            }
            
            textarea.focus();
        }

        async function checkImagePermissionForNewPost() {
            const insertImageBtn = document.getElementById('insert-image-btn');
            if (!insertImageBtn) return;

            const token = getFlarumToken();
            if (!token) {
                insertImageBtn.style.display = 'none';
                return;
            }

            const currentUserId = localStorage.getItem('flarumUserId');
            if (!currentUserId) {
                insertImageBtn.style.display = 'none';
                return;
            }

            try {
                const userJson = await flarumRequest(`/users/${currentUserId}?include=groups`);
                const groups = userJson?.data?.relationships?.groups?.data || [];
                const isAdminOrMod = groups.some(g => ['1', '2'].includes(g.id));
                insertImageBtn.style.display = isAdminOrMod ? 'inline-flex' : 'none';
            } catch {
                insertImageBtn.style.display = 'none';
            }
        }
    </script>
