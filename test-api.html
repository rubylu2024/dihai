<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flarum API жөӢиҜ•</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; }
    </style>
</head>
<body>
    <h1>Flarum API иҝһжҺҘжөӢиҜ•</h1>
    <div id="test-results"></div>
    
    <script>
        const FLARUM_BASE_URL = 'https://www.reddragonfly.cyou/';
        
        function isFlarumConfigured() {
            return typeof FLARUM_BASE_URL === 'string' && FLARUM_BASE_URL.trim().length > 0;
        }
        
        function getFlarumApiBase() {
            return FLARUM_BASE_URL.replace(/\/+$/, '') + '/api';
        }
        
        async function flarumRequest(path, options = {}) {
            const apiBase = getFlarumApiBase();
            const url = apiBase + (path.startsWith('/') ? path : '/' + path);
            
            const headers = {
                'Accept': 'application/vnd.api+json',
                ...options.headers
            };
            
            if (options.json !== undefined) {
                headers['Content-Type'] = 'application/vnd.api+json';
            }
            
            try {
                const response = await fetch(url, {
                    method: options.method || 'GET',
                    headers,
                    body: options.json !== undefined ? JSON.stringify(options.json) : options.body
                });
                
                if (!response.ok) {
                    throw new Error(`Flarum API иҜ·жұӮеӨұиҙҘ: ${response.status} ${response.statusText}`);
                }
                
                if (response.status === 204) return null;
                return await response.json();
            } catch (error) {
                throw error;
            }
        }
        
        async function runTests() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '';
            
            // жөӢиҜ•1: жЈҖжҹҘй…ҚзҪ?            addResult('жөӢиҜ•1: жЈҖжҹҘFlarumй…ҚзҪ®', isFlarumConfigured() ? 'жҲҗеҠҹ' : 'еӨұиҙҘ');
            
            if (!isFlarumConfigured()) {
                addResult('й”ҷиҜҜ', 'Flarumй…ҚзҪ®жңӘе®ҢжҲ?);
                return;
            }
            
            // жөӢиҜ•2: е°қиҜ•иҺ·еҸ–и®Ёи®әеҲ—иЎЁ
            try {
                const discussions = await flarumRequest('/discussions?sort=-createdAt&page[limit]=5&include=user');
                addResult('жөӢиҜ•2: иҺ·еҸ–и®Ёи®әеҲ—иЎЁ', 'жҲҗеҠҹ', discussions);
            } catch (error) {
                addResult('жөӢиҜ•2: иҺ·еҸ–и®Ёи®әеҲ—иЎЁ', 'еӨұиҙҘ', error.message);
            }
            
            // жөӢиҜ•3: е°қиҜ•иҺ·еҸ–APIдҝЎжҒҜ
            try {
                const info = await flarumRequest('/');
                addResult('жөӢиҜ•3: иҺ·еҸ–APIдҝЎжҒҜ', 'жҲҗеҠҹ', info);
            } catch (error) {
                addResult('жөӢиҜ•3: иҺ·еҸ–APIдҝЎжҒҜ', 'еӨұиҙҘ', error.message);
            }
        }
        
        function addResult(testName, status, details = null) {
            const resultsDiv = document.getElementById('test-results');
            const div = document.createElement('div');
            div.className = `test-result ${status === 'жҲҗеҠҹ' ? 'success' : 'error'}`;
            div.innerHTML = `<strong>${testName}</strong>: ${status}`;
            if (details) {
                div.innerHTML += `<br><small>${typeof details === 'object' ? JSON.stringify(details, null, 2) : details}</small>`;
            }
            resultsDiv.appendChild(div);
        }
        
        // йЎөйқўеҠ иҪҪеҗҺиҝҗиЎҢжөӢиҜ?        window.addEventListener('DOMContentLoaded', runTests);
    </script>
</body>
</html>
