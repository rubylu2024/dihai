<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后端管理系统 - 控制面板</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <h3>管理菜单</h3>
            <ul>
                <li class="active"><a href="#dashboard">仪表盘</a></li>
                <li><a href="#posts">帖子管理</a></li>
                <li><a href="#users">用户管理</a></li>
                <li><a href="#settings">系统设置</a></li>
            </ul>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 顶部导航 -->
            <div class="top-nav">
                <h2>后端管理系统</h2>
                <div class="user-info">
                    <span>欢迎, 管理员</span>
                    <button class="logout-btn">退出登录</button>
                </div>
            </div>
            
            <!-- 仪表盘 -->
            <div id="dashboard" class="content-card">
                <h3>仪表盘</h3>
                <div style="display: flex; gap: 20px; margin-top: 20px;">
                    <div style="flex: 1; background-color: #f5f5f5; padding: 20px; border-radius: 8px;">
                        <h4>总帖子数</h4>
                        <p style="font-size: 24px; font-weight: bold; color: #3498db;">3</p>
                    </div>
                    <div style="flex: 1; background-color: #f5f5f5; padding: 20px; border-radius: 8px;">
                        <h4>总用户数</h4>
                        <p style="font-size: 24px; font-weight: bold; color: #4CAF50;">3</p>
                    </div>
                    <div style="flex: 1; background-color: #f5f5f5; padding: 20px; border-radius: 8px;">
                        <h4>总浏览量</h4>
                        <p style="font-size: 24px; font-weight: bold; color: #ff9800;">2764</p>
                    </div>
                </div>
            </div>
            
            <!-- 帖子管理 -->
            <div id="posts" class="content-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>帖子管理</h3>
                    <button id="add-post-btn" class="btn btn-success">添加帖子</button>
                </div>
                
                <div id="posts-container">
                    <!-- 帖子列表将通过JavaScript动态加载 -->
                </div>
                
                <!-- 添加帖子表单 -->
                <div id="post-form" class="form-container" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
                    <h4>添加新帖子</h4>
                    <form>
                        <div class="form-row">
                            <label for="post-title">标题</label>
                            <input type="text" id="post-title" required>
                        </div>
                        <div class="form-row">
                            <label for="post-author">作者</label>
                            <input type="text" id="post-author" required>
                        </div>
                        <div class="form-row">
                            <label for="post-content">内容</label>
                            <textarea id="post-content" required></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">保存</button>
                            <button type="button" class="btn" onclick="document.getElementById('post-form').style.display = 'none'">取消</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- 用户管理 -->
            <div id="users" class="content-card">
                <h3>用户管理</h3>
                <div id="users-container">
                    <!-- 用户列表将通过JavaScript动态加载 -->
                </div>
            </div>
            
            <!-- 系统设置 -->
            <div id="settings" class="content-card">
                <h3>系统设置</h3>
                <div class="form-container">
                    <div class="form-row">
                        <label for="site-title">网站标题</label>
                        <input type="text" id="site-title" value="解密游戏论坛">
                    </div>
                    <div class="form-row">
                        <label for="site-description">网站描述</label>
                        <textarea id="site-description">一个专注于解密游戏的论坛</textarea>
                    </div>
                    <div class="form-row">
                        <label for="admin-email">管理员邮箱</label>
                        <input type="email" id="admin-email" value="admin@example.com">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary">保存设置</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
