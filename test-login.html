<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>зҷ»еҪ•жөӢиҜ•</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            border-color: #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }
        pre {
            background-color: #f5f5f5;
            padding: 10px;
            overflow-x: auto;
            border-radius: 3px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>Flarum зҷ»еҪ•жөӢиҜ•</h1>

    <div class="test-section">
        <h3>1. жөӢиҜ• API иҝһйҖҡжҖ?/h3>
        <button onclick="testApiConnectivity()">жөӢиҜ• API иҝһйҖҡжҖ?/button>
        <pre id="connectivity-result">зӯүеҫ…жөӢиҜ•...</pre>
    </div>

    <div class="test-section">
        <h3>2. жөӢиҜ•иҺ·еҸ– Token</h3>
        <div>
            <input type="text" id="test-username" placeholder="з”ЁжҲ·еҗҚжҲ–йӮ®з®ұ">
            <input type="password" id="test-password" placeholder="еҜҶз Ғ">
        </div>
        <button onclick="testLogin()">жөӢиҜ•зҷ»еҪ•</button>
        <pre id="login-result">зӯүеҫ…жөӢиҜ•...</pre>
    </div>

    <div class="test-section">
        <h3>3. жЈҖжҹ?CORS й…ҚзҪ®</h3>
        <button onclick="checkCors()">жЈҖжҹ?CORS</button>
        <pre id="cors-result">зӯүеҫ…жөӢиҜ•...</pre>
    </div>

    <script>
        const API_BASE = '/api';

        async function testApiConnectivity() {
            const resultEl = document.getElementById('connectivity-result');
            try {
                const response = await fetch(API_BASE + '/discussions', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/vnd.api+json'
                    }
                });
                resultEl.textContent = `зҠ¶жҖ? ${response.status} ${response.statusText}\n`;
                resultEl.textContent += `CORS: ${response.headers.get('Access-Control-Allow-Origin') || 'жңӘй…ҚзҪ?}\n`;
                const data = await response.json();
                resultEl.textContent += `ж•°жҚ®: ${JSON.stringify(data, null, 2).substring(0, 500)}...`;
                resultEl.parentElement.className = 'test-section success';
            } catch (error) {
                resultEl.textContent = `й”ҷиҜҜ: ${error.message}`;
                resultEl.parentElement.className = 'test-section error';
            }
        }

        async function testLogin() {
            const username = document.getElementById('test-username').value;
            const password = document.getElementById('test-password').value;
            const resultEl = document.getElementById('login-result');

            if (!username || !password) {
                resultEl.textContent = 'иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚе’ҢеҜҶз ?;
                return;
            }

            try {
                const response = await fetch(API_BASE + '/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.api+json'
                    },
                    body: JSON.stringify({
                        identification: username,
                        password: password
                    })
                });

                resultEl.textContent = `зҠ¶жҖ? ${response.status} ${response.statusText}\n`;
                resultEl.textContent += `CORSеӨ? ${response.headers.get('Access-Control-Allow-Origin') || 'жңӘй…ҚзҪ?}\n`;

                const text = await response.text();
                resultEl.textContent += `е“Қеә”еҶ…е®№: ${text.substring(0, 500)}\n`;

                if (response.ok) {
                    const data = JSON.parse(text);
                    if (data.token) {
                        resultEl.textContent += `\nвң?зҷ»еҪ•жҲҗеҠҹ! Token: ${data.token.substring(0, 20)}...`;
                        resultEl.parentElement.className = 'test-section success';
                    } else {
                        resultEl.textContent += `\nвқ?е“Қеә”дёӯжІЎжң?token`;
                        resultEl.parentElement.className = 'test-section error';
                    }
                } else {
                    resultEl.parentElement.className = 'test-section error';
                }
            } catch (error) {
                resultEl.textContent = `й”ҷиҜҜ: ${error.message}\nиҝҷеҸҜиғҪжҳҜ CORS й—®йўҳжҲ–зҪ‘з»ңй—®йўҳ`;
                resultEl.parentElement.className = 'test-section error';
            }
        }

        async function checkCors() {
            const resultEl = document.getElementById('cors-result');
            try {
                const response = await fetch(API_BASE + '/discussions', {
                    method: 'OPTIONS'
                });
                resultEl.textContent = `йў„жЈҖиҜ·жұӮзҠ¶жҖ? ${response.status}\n`;
                resultEl.textContent += `Access-Control-Allow-Origin: ${response.headers.get('Access-Control-Allow-Origin') || 'жңӘй…ҚзҪ?}\n`;
                resultEl.textContent += `Access-Control-Allow-Methods: ${response.headers.get('Access-Control-Allow-Methods') || 'жңӘй…ҚзҪ?}\n`;
                resultEl.textContent += `Access-Control-Allow-Headers: ${response.headers.get('Access-Control-Allow-Headers') || 'жңӘй…ҚзҪ?}\n`;

                if (!response.headers.get('Access-Control-Allow-Origin')) {
                    resultEl.textContent += `\nвҡ пёҸ CORS жңӘй…ҚзҪ®пјҒиҝҷеҸҜиғҪеҜјиҮҙи·ЁеҹҹиҜ·жұӮеӨұиҙҘ`;
                    resultEl.parentElement.className = 'test-section error';
                } else {
                    resultEl.parentElement.className = 'test-section success';
                }
            } catch (error) {
                resultEl.textContent = `й”ҷиҜҜ: ${error.message}`;
                resultEl.parentElement.className = 'test-section error';
            }
        }
    </script>
</body>
</html>
