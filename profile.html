    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const token = localStorage.getItem('flarumToken');
            const userId = localStorage.getItem('flarumUserId');
            
            if (!token) {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('error-content').style.display = 'block';
                return;
            }
            
            try {
                // иҺ·еҸ–з”ЁжҲ·дҝЎжҒҜ
                const userData = await fetchUserData(userId);
                if (userData) {
                    displayUserProfile(userData);
                }
                
                // иҺ·еҸ–з”ЁжҲ·з»ҹи®Ўж•°жҚ®
                const stats = await fetchUserStats(userId);
                displayUserStats(stats);
                
                // иҺ·еҸ–з”ЁжҲ·жңҖиҝ‘её–еӯ?                const posts = await fetchUserDiscussions(userId);
                displayRecentPosts(posts);
                
                // иҺ·еҸ–з”ЁжҲ·жңҖиҝ‘еӣһеӨ?                const comments = await fetchUserComments(userId);
                displayRecentComments(comments);
                
                // жҳҫзӨәйҖҖеҮәзҷ»еҪ•жҢүй’?                document.getElementById('logout-btn').style.display = 'inline-block';
                document.getElementById('logout-btn').addEventListener('click', function() {
                    localStorage.removeItem('flarumToken');
                    localStorage.removeItem('flarumUserId');
                    localStorage.removeItem('flarumUsername');
                    window.location.href = 'index.html';
                });
                
            } catch (error) {
                console.error('еҠ иҪҪдёӘдәәиө„ж–ҷеӨұиҙҘ:', error);
                document.getElementById('error-content').innerHTML = `
                    <p>еҠ иҪҪдёӘдәәиө„ж–ҷеӨұиҙҘ: ${error.message}</p>
                    <a href="login.html">зӮ№еҮ»йҮҚж–°зҷ»еҪ•</a>
                `;
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('profile-content').style.display = 'block';
            }
        });
        
        // иҺ·еҸ–з”ЁжҲ·дҝЎжҒҜ
        async function fetchUserData(userId) {
            try {
                const data = await flarumRequest('/users/' + userId + '?include=groups');
                return data;
            } catch (error) {
                console.error('иҺ·еҸ–з”ЁжҲ·дҝЎжҒҜеӨұиҙҘ:', error);
                return null;
            }
        }
        
        // иҺ·еҸ–з”ЁжҲ·з»ҹи®Ўж•°жҚ®
        async function fetchUserStats(userId) {
            const stats = { posts: 0, comments: 0, likes: 0, reputation: 0 };
            
            try {
                // иҺ·еҸ–еҸ‘её–ж•?                const discussionsData = await flarumRequest('/discussions?filter[author]=' + userId);
                stats.posts = discussionsData.data?.length || 0;
                
                // иҺ·еҸ–иҜ„и®әж•?                const postsData = await flarumRequest('/posts?filter[author]=' + userId);
                stats.comments = (postsData.data?.length || 0) - stats.posts;
                
                // иҺ·еҸ–еЈ°жңӣе’ҢиҺ·иөһж•°
                const userData = await flarumRequest('/users/' + userId);
                stats.reputation = userData.data?.attributes?.reputation || 0;
                stats.likes = userData.data?.attributes?.likesCount || 0;
                
            } catch (error) {
                console.error('иҺ·еҸ–з”ЁжҲ·з»ҹи®ЎеӨұиҙҘ:', error);
            }
            
            return stats;
        }
        
        // иҺ·еҸ–з”ЁжҲ·жңҖиҝ‘её–еӯ?        async function fetchUserDiscussions(userId) {
            try {
                const data = await flarumRequest('/discussions?filter[author]=' + userId + '&page[limit]=5&include=user');
                return data.data || [];
            } catch (error) {
                console.error('иҺ·еҸ–з”ЁжҲ·её–еӯҗеӨұиҙҘ:', error);
                return [];
            }
        }
        
        // иҺ·еҸ–з”ЁжҲ·жңҖиҝ‘еӣһеӨ?        async function fetchUserComments(userId) {
            try {
                const data = await flarumRequest('/posts?filter[author]=' + userId + '&page[limit]=5&include=discussion');
                // иҝҮж»ӨжҺүдё»йўҳеё–пјҢеҸӘдҝқз•ҷеӣһеӨҚ
                const comments = data.data?.filter(p => p.attributes?.number !== 1) || [];
                return comments.slice(0, 5);
            } catch (error) {
                console.error('иҺ·еҸ–з”ЁжҲ·еӣһеӨҚеӨұиҙҘ:', error);
                return [];
            }
        }
        
        // жҳҫзӨәз”ЁжҲ·иө„ж–ҷ
        function displayUserProfile(userData) {
            if (!userData?.data) return;
            
            const user = userData.data;
            const included = userData.included || [];
            
            // з”ЁжҲ·еҗ?            const username = user.attributes?.username || 'жңӘи®ҫзҪ?;
            const displayName = user.attributes?.displayName || username;
            
            document.getElementById('user-name').textContent = displayName;
            document.getElementById('info-username').textContent = username;
            document.getElementById('info-displayname').textContent = displayName;
            
            // йӮ®з®ұ
            document.getElementById('user-email').textContent = user.attributes?.email || 'жңӘи®ҫзҪ?;
            document.getElementById('info-email').textContent = user.attributes?.email || '-';
            
            // з”ЁжҲ·ID
            document.getElementById('info-id').textContent = user.id || '-';
            
            // жіЁеҶҢж—¶й—ҙ
            if (user.attributes?.joinedAt) {
                document.getElementById('info-joined').textContent = formatDate(user.attributes.joinedAt);
            }
            
            // жңҖеҗҺжҙ»и·?            if (user.attributes?.lastSeenAt) {
                document.getElementById('info-lastActive').textContent = formatDate(user.attributes.lastSeenAt);
            } else if (user.attributes?.lastActivityAt) {
                document.getElementById('info-lastActive').textContent = formatDate(user.attributes.lastActivityAt);
            }
            
            // з”ЁжҲ·з»?            const groups = user.relationships?.groups?.data || [];
            let groupNames = [];
            let badgeHTML = '';
            
            groups.forEach(groupRef => {
                const group = included.find(i => i.type === 'groups' && i.id === groupRef.id);
                if (group) {
                    const groupName = group.attributes?.name || group.attributes?.singularName || 'жңӘзҹҘ';
                    groupNames.push(groupName);
                    
                    // ж·»еҠ з»„ж Үеҝ?                    if (groupRef.id === '1') {
                        badgeHTML = '<span class="group-badge admin">[з®Ў]</span>';
                    } else if (groupRef.id === '2') {
                        badgeHTML = '<span class="group-badge mod">[зүҲ]</span>';
                    }
                }
            });
            
            document.getElementById('info-group').textContent = groupNames.join(', ') || 'жҷ®йҖҡдјҡе‘?;
            document.getElementById('user-group-badge').innerHTML = badgeHTML;
            
            // дҝЎд»»зӯүзә§
            const trustLevel = user.attributes?.trustLevel || 0;
            const trustLevels = ['ж–°жүӢдёҠи·Ҝ', 'еҲқзә§дјҡе‘ҳ', 'дёӯзә§дјҡе‘ҳ', 'й«ҳзә§дјҡе‘ҳ', 'иө„ж·ұдјҡе‘ҳ', 'зІҫиӢұдјҡе‘ҳ'];
            document.getElementById('info-trust').textContent = trustLevels[trustLevel] || 'ж–°жүӢдёҠи·Ҝ';
            
            // зӯҫеҗҚ
            const signature = user.attributes?.signature;
            if (signature && signature.trim()) {
                document.getElementById('user-signature').textContent = signature;
                document.getElementById('user-signature').style.display = 'block';
            }
            
            // еӨҙеғҸ
            const avatarUrl = user.attributes?.avatarUrl;
            const avatarContainer = document.getElementById('user-avatar');
            if (avatarUrl) {
                avatarContainer.innerHTML = `<img src="${avatarUrl}" alt="еӨҙеғҸ">`;
            }
            
            // з”ЁжҲ·еӨҙиЎ”
            const title = user.attributes?.title || getTitleByTrustLevel(trustLevel);
            document.getElementById('user-title').textContent = title;
        }
        
        // ж №жҚ®дҝЎд»»зӯүзә§иҺ·еҸ–еӨҙиЎ”
        function getTitleByTrustLevel(level) {
            const titles = ['ж–°жүӢдёҠи·Ҝ', 'еҲқжқҘд№ҚеҲ°', 'жёҗе…ҘдҪіеўғ', 'зҷ»е Ӯе…Ҙе®Ө', 'зӮүзҒ«зәҜйқ’', 'еҮәзҘһе…ҘеҢ–'];
            return titles[level] || 'ж–°жүӢдёҠи·Ҝ';
        }
        
        // жҳҫзӨәз»ҹи®Ўж•°жҚ®
        function displayUserStats(stats) {
            document.getElementById('stat-posts').textContent = stats.posts || 0;
            document.getElementById('stat-comments').textContent = stats.comments || 0;
            document.getElementById('stat-likes').textContent = stats.likes || 0;
            document.getElementById('stat-reputation').textContent = stats.reputation || 0;
        }
        
        // жҳҫзӨәжңҖиҝ‘её–еӯ?        function displayRecentPosts(posts) {
            const list = document.getElementById('recent-posts-list');
            
            if (!posts || posts.length === 0) {
                list.innerHTML = '<li class="no-data">жҡӮж— её–еӯҗ</li>';
                return;
            }
            
            list.innerHTML = posts.map(post => {
                const title = post.attributes?.title || 'ж— ж Үйў?;
                const createdAt = post.attributes?.createdAt ? formatDate(post.attributes.createdAt) : '';
                return `
                    <li class="post-item">
                        <a href="post.html?id=${post.id}" class="post-title">${title}</a>
                        <span class="post-meta">${createdAt}</span>
                    </li>
                `;
            }).join('');
        }
        
        // жҳҫзӨәжңҖиҝ‘еӣһеӨ?        function displayRecentComments(comments) {
            const list = document.getElementById('recent-comments-list');
            
            if (!comments || comments.length === 0) {
                list.innerHTML = '<li class="no-data">жҡӮж— еӣһеӨҚ</li>';
                return;
            }
            
            list.innerHTML = comments.map(comment => {
                const discussionId = comment.relationships?.discussion?.data?.id;
                const content = comment.attributes?.content;
                const preview = content ? stripHtml(content).substring(0, 30) + (content.length > 30 ? '...' : '') : '';
                const createdAt = comment.attributes?.createdAt ? formatDate(comment.attributes.createdAt) : '';
                
                return `
                    <li class="post-item">
                        <a href="post.html?id=${discussionId}#post-${comment.attributes?.number}" class="post-title" title="${preview}">${preview || 'ж— еҶ…е®?}</a>
                        <span class="post-meta">${createdAt}</span>
                    </li>
                `;
            }).join('');
        }
        
        // ж јејҸеҢ–ж—Ҙжң?        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return '-';
            const pad = n => String(n).padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }
        
        // з§»йҷӨHTMLж Үзӯҫ
        function stripHtml(html) {
            if (!html) return '';
            return html.replace(/<[^>]*>/g, '').trim();
        }
        
        // еӨ„зҗҶеӨҙеғҸдёҠдј 
        async function handleAvatarUpload(input) {
            const file = input.files[0];
            if (!file) return;
            
            // йӘҢиҜҒж–Үд»¶зұ»еһӢ
            if (!file.type.startsWith('image/')) {
                alert('иҜ·йҖүжӢ©еӣҫзүҮж–Үд»¶пј?);
                return;
            }
            
            // йӘҢиҜҒж–Үд»¶еӨ§е°ҸпјҲйҷҗеҲ¶еңЁ2MBд»ҘеҶ…пј?            if (file.size > 2 * 1024 * 1024) {
                alert('еӣҫзүҮеӨ§е°ҸдёҚиғҪи¶…иҝҮ2MBпј?);
                return;
            }
            
            const userId = localStorage.getItem('flarumUserId');
            const token = localStorage.getItem('flarumToken');
            
            try {
                // жҳҫзӨәеҠ иҪҪзҠ¶жҖ?                const avatarContainer = document.querySelector('.avatar-container');
                avatarContainer.style.opacity = '0.5';
                avatarContainer.style.cursor = 'wait';
                
                // еҲӣе»әFormData
                const formData = new FormData();
                formData.append('avatar', file);
                
                // еҸ‘йҖҒиҜ·жұ?                const response = await fetch('/api/users/' + userId + '/avatar', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Token ' + token + '; userId=' + userId
                    },
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    // жӣҙж–°еӨҙеғҸжҳҫзӨә
                    const avatarUrl = data.data?.attributes?.avatarUrl;
                    if (avatarUrl) {
                        document.getElementById('user-avatar').innerHTML = `<img src="${avatarUrl}" alt="еӨҙеғҸ">`;
                    }
                    alert('еӨҙеғҸдёҠдј жҲҗеҠҹпј?);
                } else {
                    const errorData = await response.json();
                    alert('дёҠдј еӨұиҙҘ: ' + (errorData.errors?.[0]?.detail || 'жңӘзҹҘй”ҷиҜҜ'));
                }
            } catch (error) {
                console.error('дёҠдј еӨҙеғҸеӨұиҙҘ:', error);
                alert('дёҠдј еӨҙеғҸеӨұиҙҘпјҢиҜ·йҮҚиҜ•');
            } finally {
                // жҒўеӨҚзҠ¶жҖ?                const avatarContainer = document.querySelector('.avatar-container');
                avatarContainer.style.opacity = '1';
                avatarContainer.style.cursor = 'pointer';
                // йҮҚзҪ®input
                input.value = '';
            }
        }
    </script>
</body>
