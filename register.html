<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 红蜻蜓论坛</title>
    <link rel="stylesheet" href="styles.css?v=20260430-2">
    <style>
        /* 注册页面样式 */
        .register-container {
            width: 100%;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border: 1px solid #000;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #ccc;
        }
        
        .register-header h2 {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .register-header p {
            font-size: 14px;
            color: #666;
        }
        
        .register-form .form-group {
            margin-bottom: 15px;
        }
        
        .register-form .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
        
        .register-form .form-group .input-wrapper {
            display: flex;
            gap: 8px;
        }
        
        .register-form .form-group input {
            flex: 1;
            padding: 8px;
            border: 1px solid #990000;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .register-form .form-group input.error {
            border-color: #cc0000;
            background-color: #ffe6e6;
        }
        
        .register-form .form-group input:focus {
            outline: none;
            border-color: #cc0000;
        }
        
        .register-form .form-group .toggle-btn {
            padding: 8px 12px;
            background-color: #f0f0f0;
            border: 1px solid #990000;
            color: #333;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        
        .register-form .form-group .toggle-btn:hover {
            background-color: #e0e0e0;
        }
        
        .register-btn {
            width: 100%;
            background-color: #cc0000;
            color: white;
            border: 1px solid #990000;
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .register-btn:hover:not(:disabled) {
            background-color: #990000;
        }
        
        .register-btn:disabled {
            background-color: #999;
            cursor: not-allowed;
        }
        
        .register-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px dashed #ccc;
        }
        
        .register-footer p {
            font-size: 14px;
            color: #666;
        }
        
        .register-footer a {
            color: #0066cc;
            text-decoration: none;
        }
        
        .register-footer a:hover {
            text-decoration: underline;
            color: #cc0000;
        }
        
        .error-message {
            background-color: #ffe6e6;
            color: #cc0000;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ffcccc;
            font-size: 14px;
        }
        
        .success-message {
            background-color: #e6ffe6;
            color: #006600;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccffcc;
            font-size: 14px;
        }
        
        /* 加载状态 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #cc0000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="forum-frame-outer">
        <div class="forum-content">
            <div class="forum-frame">
                <!-- 顶部导航栏 -->
                <div class="top-nav">
                    <div class="top-nav-container">
                        <div class="logo">
                            <div class="logo-image"></div>
                            <a href="index.html">红蜻蜓论坛</a>
                            <a href="index.html" class="logo-sub">www.reddragonfly.cyou</a>
                        </div>
                        <div class="top-links">
                            <a href="index.html">论坛</a>
                            <a href="#">博客</a>
                            <a href="#">问答</a>
                            <a href="https://www.4399.com" target="_blank">游戏厅</a>
                            <a href="#">品牌</a>
                            <a href="#">更多</a>
                        </div>
                        <div class="search-box">
                                <input type="text" placeholder="搜帖、找人、搜版块">
                                <button>搜索</button>
                            </div>
                        <div class="user-links">
                            <button id="audio-toggle" class="audio-toggle">
                                <span class="audio-icon">♪</span>
                            </button>
                            <a href="#">服务</a>
                            <div id="user-links-container">
                                <a href="login.html" id="login-btn">登录</a>
                                <a href="register.html" id="register-btn">注册</a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 主要内容区 -->
                <div class="main-container">
                    <div class="main-content" style="display: flex; justify-content: center; align-items: center; min-height: 600px;">
                        <div class="register-container">
                            <div class="register-header">
                                <h2>用户注册</h2>
                                <p>注册账号后即可参与论坛讨论</p>
                            </div>
                            
                            <form class="register-form" id="register-form">
                                <div id="message-container"></div>
                                
                                <div class="form-group">
                                    <label for="username">用户名</label>
                                    <input type="text" id="username" name="username" required placeholder="请至少包含一个字母，3-30个字符">
                                </div>
                                
                                <div class="form-group">
                                    <label for="email">邮箱</label>
                                    <input type="email" id="email" name="email" required placeholder="后续用于修改密码">
                                </div>
                                
                                <div class="form-group">
                                    <label for="password">密码</label>
                                    <div class="input-wrapper">
                                        <input type="password" id="password" name="password" required placeholder="请至少包含一个字母，长度至少8位">
                                        <button type="button" class="toggle-btn" id="toggle-password">显示</button>
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label for="confirm-password">确认密码</label>
                                    <div class="input-wrapper">
                                        <input type="password" id="confirm-password" name="confirm-password" required>
                                        <button type="button" class="toggle-btn" id="toggle-confirm-password">显示</button>
                                    </div>
                                </div>
                                
                                <button type="submit" class="register-btn" id="register-btn-submit">注册</button>
                            </form>
                            
                            <div class="register-footer">
                                <p>已有账号？ <a href="login.html">立即登录</a></p>
                                <p><a href="index.html">返回首页</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        const errorMap = {
            validation_error: '注册信息不符合要求，请检查用户名、邮箱或密码',
            username_taken: '这个用户名已经被使用',
            email_taken: '这个邮箱已经注册过',
            csrf_token_mismatch: '注册验证失败，请刷新页面后重试',
            permission_denied: '当前论坛暂不允许注册',
            rate_limit_exceeded: '操作太频繁，请稍后再试'
        };

        async function customRegister(username, email, password) {
            const response = await fetch('/custom-register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const result = await response.json();
            if (!response.ok) {
                const error = new Error('注册失败');
                error.result = result;
                throw error;
            }
            return result;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('register-form');
            const messageContainer = document.getElementById('message-container');
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirm-password');
            const submitBtn = document.getElementById('register-btn-submit');
            const togglePasswordBtn = document.getElementById('toggle-password');
            const toggleConfirmPasswordBtn = document.getElementById('toggle-confirm-password');

            // 密码明文切换
            togglePasswordBtn.addEventListener('click', function() {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    togglePasswordBtn.textContent = '隐藏';
                } else {
                    passwordInput.type = 'password';
                    togglePasswordBtn.textContent = '显示';
                }
            });

            toggleConfirmPasswordBtn.addEventListener('click', function() {
                if (confirmPasswordInput.type === 'password') {
                    confirmPasswordInput.type = 'text';
                    toggleConfirmPasswordBtn.textContent = '隐藏';
                } else {
                    confirmPasswordInput.type = 'password';
                    toggleConfirmPasswordBtn.textContent = '显示';
                }
            });

            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const username = usernameInput.value;
                const email = emailInput.value;
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                // 重置输入框状态
                [usernameInput, emailInput, passwordInput, confirmPasswordInput].forEach(input => input.classList.remove('error'));

                // 前端校验
                const validationError = validateForm(username, email, password, confirmPassword);
                if (validationError) {
                    showMessage(validationError.message, 'error');
                    if (validationError.field) {
                        validationError.field.classList.add('error');
                    }
                    return;
                }

                // 禁用按钮
                submitBtn.disabled = true;
                submitBtn.textContent = '注册中...';
                showLoading();

                try {
                    await customRegister(username, email, password);
                    
                    // 注册成功，开始自动登录
                    submitBtn.textContent = '正在登录...';
                    const loginSuccess = await flarumLogin(username, password);
                    
                    if (loginSuccess) {
                        showMessage('注册成功，正在进入论坛...', 'success');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                    } else {
                        showMessage('注册成功，但自动登录失败，请手动登录', 'success');
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 1500);
                    }
                } catch (error) {
                    console.error('注册失败:', error);
                    let errorMsg = '注册失败';
                    if (error.result) {
                        if (error.result.errors && error.result.errors.length > 0) {
                            errorMsg = error.result.errors.map(e => {
                                if (e.detail) return e.detail;
                                if (e.code && errorMap[e.code]) return errorMap[e.code];
                                if (e.code) return e.code;
                                if (e.title) return e.title;
                                return JSON.stringify(e);
                            }).join('\n');
                        } else if (error.result.message) {
                            errorMsg = error.result.message;
                        } else {
                            errorMsg = JSON.stringify(error.result);
                        }
                    } else if (error.message) {
                        errorMsg = error.message;
                    }
                    showMessage(errorMsg, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '注册';
                    hideLoading();
                }
            });

            function validateForm(username, email, password, confirmPassword) {
                // 用户名校验
                if (!username || !username.trim()) {
                    return { message: '用户名不能为空', field: usernameInput };
                }
                const trimmedUsername = username.trim();
                if (trimmedUsername.length < 3 || trimmedUsername.length > 30) {
                    return { message: '用户名长度需为 3-30 个字符', field: usernameInput };
                }
                if (/^\d+$/.test(trimmedUsername)) {
                    return { message: '用户名不能是纯数字，请至少包含一个字母', field: usernameInput };
                }
                if (!/^[a-zA-Z0-9_-]+$/.test(trimmedUsername)) {
                    return { message: '用户名只能包含英文字母、数字、下划线或短横线', field: usernameInput };
                }
                if (/\s/.test(trimmedUsername)) {
                    return { message: '用户名不能包含空格', field: usernameInput };
                }

                // 邮箱校验
                if (!email || !email.trim()) {
                    return { message: '邮箱不能为空', field: emailInput };
                }
                const trimmedEmail = email.trim();
                if (/\s/.test(trimmedEmail)) {
                    return { message: '邮箱不能包含空格', field: emailInput };
                }
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(trimmedEmail)) {
                    return { message: '请输入正确的邮箱地址', field: emailInput };
                }

                // 密码校验
                if (!password) {
                    return { message: '密码不能为空', field: passwordInput };
                }
                if (!password.trim()) {
                    return { message: '密码不能全是空格', field: passwordInput };
                }
                if (password.length < 8) {
                    return { message: '密码长度至少 8 位', field: passwordInput };
                }
                if (!/[a-zA-Z]/.test(password)) {
                    return { message: '密码请至少包含一个字母', field: passwordInput };
                }

                // 确认密码校验
                if (!confirmPassword) {
                    return { message: '请再次输入密码', field: confirmPasswordInput };
                }
                if (confirmPassword !== password) {
                    return { message: '两次输入的密码不一致', field: confirmPasswordInput };
                }

                return null;
            }

            // 显示消息
            function showMessage(message, type) {
                messageContainer.innerHTML = `
                    <div class="${type === 'error' ? 'error-message' : 'success-message'}">
                        ${message.replace(/\n/g, '<br>')}
                    </div>
                `;
            }

            // 显示加载状态
            function showLoading() {
                const loadingOverlay = document.createElement('div');
                loadingOverlay.className = 'loading-overlay';
                loadingOverlay.id = 'loading-overlay';
                loadingOverlay.innerHTML = '<div class="loading-spinner"></div>';
                document.body.appendChild(loadingOverlay);
            }

            // 隐藏加载状态
            function hideLoading() {
                const loadingOverlay = document.getElementById('loading-overlay');
                if (loadingOverlay) {
                    loadingOverlay.remove();
                }
            }
        });
    </script>
</body>
</html>
